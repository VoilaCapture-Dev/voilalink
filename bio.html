<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Rivera — VoilaLink</title>
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#818cf8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VoilaLink" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme: Midnight (default) ────────────────────────── */
    :root {
      --bg:           #0a0a0f;
      --surface:      #13131a;
      --card:         #1a1a24;
      --card-hover:   #20202e;
      --border:       rgba(255,255,255,0.08);
      --text-primary: #f0f0f5;
      --text-muted:   #8888a8;
      --accent:       #818cf8;
      --accent-2:     #a78bfa;
      --accent-glow:  rgba(129,140,248,0.15);
    }

    /* ── Body ─────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Avatar ───────────────────────────────────────────── */
    .avatar-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      color: #fff;
      border: 3px solid var(--border);
    }
    .avatar-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px;
      background: #22c55e;
      border: 2px solid var(--bg);
      border-radius: 50%;
    }

    /* ── Profile ──────────────────────────────────────────── */
    .name {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      margin-bottom: 4px;
      text-align: center;
    }
    .handle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 10px;
      text-align: center;
    }
    .bio {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* ── Social pills ─────────────────────────────────────── */
    .socials {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
    }
    .social-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px; color: var(--text-muted);
      text-decoration: none;
      transition: all 0.15s;
    }
    .social-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .social-pill svg { width: 13px; height: 13px; }

    /* ── Links ────────────────────────────────────────────── */
    .links { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }

    .link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .link-card:hover {
      background: var(--card-hover);
      border-color: rgba(129,140,248,0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(129,140,248,0.12);
    }
    .link-card:hover::before { opacity: 1; }

    .link-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .link-text { flex: 1; }
    .link-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 14px;
      margin-bottom: 2px;
    }
    .link-desc { font-size: 11px; color: var(--text-muted); }
    .link-arrow {
      color: var(--text-muted);
      font-size: 16px;
      transition: transform 0.15s;
    }
    .link-card:hover .link-arrow { transform: translateX(3px); color: var(--accent); }

    /* ── Featured / wide card ─────────────────────────────── */
    .link-card.featured {
      flex-direction: column; align-items: flex-start;
      padding: 20px;
      background: linear-gradient(135deg, rgba(129,140,248,0.08), rgba(167,139,250,0.05));
      border-color: rgba(129,140,248,0.2);
    }
    .link-card.featured .link-top {
      display: flex; align-items: center; gap: 12px; width: 100%;
    }
    .featured-badge {
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-glow);
      border: 1px solid rgba(129,140,248,0.25);
      padding: 3px 8px; border-radius: 999px;
      margin-left: auto;
    }
    .link-card.featured .link-preview {
      width: 100%; height: 80px;
      background: var(--surface);
      border-radius: 8px;
      margin-top: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-muted);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
    }

    /* ── Section label ────────────────────────────────────── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      width: 100%; max-width: 480px;
      margin: 8px 0 4px;
      padding: 0 4px;
    }

    /* ── Chat widget ──────────────────────────────────────── */
    .chat-bubble {
      position: fixed; bottom: 24px; right: 24px;
      width: 54px; height: 54px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 24px rgba(129,140,248,0.45);
      z-index: 100; transition: transform 0.2s, box-shadow 0.2s;
    }
    .chat-bubble:hover { transform: scale(1.08); box-shadow: 0 6px 32px rgba(129,140,248,0.55); }

    .chat-window {
      position: fixed; bottom: 92px; right: 24px;
      width: 320px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; display: flex; flex-direction: column;
      z-index: 100; box-shadow: 0 8px 40px rgba(0,0,0,0.45);
      overflow: hidden;
      transform: translateY(16px) scale(0.97); opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      pointer-events: none;
    }
    .chat-window.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

    .chat-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--card);
    }
    .chat-header-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; color: #fff;
      overflow: hidden;
    }
    .chat-header-name { font-size: 13px; font-weight: 700; flex: 1; }
    .chat-header-status { font-size: 10px; color: #4ade80; }

    .chat-intro { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .chat-intro-title { font-size: 15px; font-weight: 700; }
    .chat-intro-sub { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    .chat-messages {
      flex-direction: column; gap: 8px;
      overflow-y: auto; padding: 14px;
      min-height: 180px; max-height: 260px;
    }
    .msg-bubble {
      max-width: 80%; padding: 8px 12px; border-radius: 14px;
      font-size: 12px; line-height: 1.5; word-break: break-word;
    }
    .msg-bubble.visitor {
      align-self: flex-end;
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble.owner {
      align-self: flex-start;
      background: var(--card); color: var(--text-primary);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 9px; opacity: 0.6; margin-top: 3px; }

    .chat-input-row {
      gap: 8px; padding: 12px; border-top: 1px solid var(--border);
    }
    .chat-inp {
      flex: 1; padding: 8px 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-primary);
      font-size: 12px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .chat-inp:focus { border-color: var(--accent); }
    .chat-inp::placeholder { color: var(--text-muted); }
    .chat-send-btn {
      width: 34px; height: 34px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 16px; color: #fff; display: flex;
      align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .chat-send-btn:hover { opacity: 0.85; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      margin-top: 48px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-muted);
      text-decoration: none;
    }
    .footer-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .footer-dot {
      width: 18px; height: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
  </style>
</head>
<body>

  <!-- Avatar -->
  <div class="avatar-wrap">
    <div class="avatar" id="bio-avatar">?</div>
    <div class="avatar-badge"></div>
  </div>

  <!-- Profile -->
  <div class="name" id="bio-name"></div>
  <div class="handle" id="bio-handle"></div>
  <div class="bio" id="bio-bio"></div>

  <!-- Social pills — rendered dynamically by bio.js -->
  <div class="socials" id="bio-socials"></div>

  <!-- Links loaded by bio.js -->
  <div class="links" id="bio-links"></div>

  <!-- Tip Jar (rendered by bio.js if enabled) -->
  <div id="bio-tipjar" style="display:none;width:100%;padding:0 16px;margin-top:8px;"></div>

  <!-- Footer -->
  <a class="footer" id="referral-footer" href="https://voilalink.com/login.html?mode=signup" target="_blank" rel="noopener noreferrer">
    <div class="footer-dot">✦</div>
    Made with <span class="footer-brand">VoilaLink</span>
    &nbsp;· Create your free page →
  </a>

  <!-- ── Chat bubble ─────────────────────────────────────── -->
  <div class="chat-bubble" id="chat-bubble" onclick="toggleChat()">💬</div>

  <!-- ── Chat window ──────────────────────────────────────── -->
  <div class="chat-window" id="chat-window">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-avatar" id="chat-header-avatar">?</div>
      <div style="flex:1;">
        <div class="chat-header-name" id="chat-header-name">Chat</div>
        <div class="chat-header-status">● Online</div>
      </div>
      <button onclick="toggleChat()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;line-height:1;padding:0;">×</button>
    </div>

    <!-- Intro: name + first message -->
    <div class="chat-intro" id="chat-intro">
      <div class="chat-intro-title">👋 Say hello!</div>
      <div class="chat-intro-sub">Enter your name and message to start a conversation.</div>
      <input id="chat-visitor-name" class="chat-inp" type="text" placeholder="Your name"
        style="padding:10px 14px;font-size:13px;" />
      <input id="chat-first-message" class="chat-inp" type="text" placeholder="Type your message…"
        style="padding:10px 14px;font-size:13px;"
        onkeydown="if(event.key==='Enter')startChat()" />
      <button id="chat-start-btn" onclick="startChat()"
        style="padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
        Send message →
      </button>
    </div>

    <!-- Messages area (shown after first message) -->
    <div class="chat-messages" id="chat-messages" style="display:none;"></div>

    <!-- Reply input -->
    <div class="chat-input-row" id="chat-input-row" style="display:none;">
      <input id="chat-msg-input" class="chat-inp" type="text" placeholder="Type a message…"
        onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;" />
      <button class="chat-send-btn" onclick="sendChat()">↑</button>
    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/bio.js"></script>
</body>
</html>
